<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추출기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 25%, #f06595 50%, #d6336c 75%, #a61e4d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #d6336c 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.95;
        }

        .content {
            padding: 3rem 2rem;
        }

        .info-box {
            background: linear-gradient(135deg, #fff5f7 0%, #ffe0eb 100%);
            border-left: 4px solid #ff6b6b;
            padding: 1.2rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            color: #333;
            line-height: 1.6;
        }

        .control-panel {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        input[type="number"] {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #ff6b6b 0%, #d6336c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            flex: 1;
            min-width: 150px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .btn-copy {
            background: #4CAF50;
            color: white;
        }

        .btn-copy:hover {
            background: #45a049;
        }

        .btn-print {
            background: #2196F3;
            color: white;
        }

        .btn-print:hover {
            background: #0b7dda;
        }

        .numbers-container {
            margin-bottom: 2rem;
        }

        .numbers-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 1rem;
        }

        .lotto-set {
            background: linear-gradient(135deg, #f9f9f9 0%, #f0f0f0 100%);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid #eee;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .set-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid #ddd;
        }

        .set-number {
            font-weight: 600;
            color: #ff6b6b;
            font-size: 1.1rem;
        }

        .set-date {
            font-size: 0.85rem;
            color: #999;
        }

        .numbers-display {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }

        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .ball.ball-1 { background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%); }
        .ball.ball-2 { background: linear-gradient(135deg, #ffa940 0%, #ff9c3d 100%); }
        .ball.ball-3 { background: linear-gradient(135deg, #ffd93d 0%, #ffb82e 100%); }
        .ball.ball-4 { background: linear-gradient(135deg, #52c41a 0%, #45a049 100%); }
        .ball.ball-5 { background: linear-gradient(135deg, #1890ff 0%, #0050b3 100%); }
        .ball.ball-6 { background: linear-gradient(135deg, #722ed1 0%, #531dab 100%); }

        .bonus-separator {
            font-weight: 700;
            color: #ff6b6b;
            font-size: 1.5rem;
        }

        .bonus-label {
            font-size: 0.85rem;
            color: #999;
            margin: 0 0.3rem;
        }

        .copy-btn-set {
            display: flex;
            gap: 0.5rem;
        }

        .copy-btn-set button {
            padding: 6px 12px;
            font-size: 0.85rem;
            flex: 1;
        }

        .stats-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid #eee;
        }

        .stats-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #fff5f7 0%, #ffe0eb 100%);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #ffcce1;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff6b6b;
        }

        .frequent-numbers {
            background: linear-gradient(135deg, #f9f9f9 0%, #f0f0f0 100%);
            padding: 1.5rem;
            border-radius: 12px;
        }

        .freq-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 1rem;
        }

        .freq-numbers {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .freq-ball {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b 0%, #d6336c 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            position: relative;
        }

        .freq-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff6b6b;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 2rem;
            font-size: 1rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .action-buttons button {
            flex: 1;
            min-width: 120px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .content {
                padding: 1.5rem;
            }

            .control-panel {
                flex-direction: column;
            }

            .btn-generate {
                min-width: unset;
            }

            .numbers-display {
                gap: 0.5rem;
            }

            .ball {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }

        @media print {
            body {
                background: white;
            }

            .header {
                background: #ff6b6b;
            }

            .control-panel, .action-buttons, .stats-section {
                display: none;
            }

            .container {
                box-shadow: none;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎰 로또 번호 추출기</h1>
            <p>행운의 번호를 찾아보세요!</p>
        </div>

        <div class="content">
            <div class="info-box">
                📌 <strong>로또 6/45 규칙:</strong> 1~45 범위에서 5개 번호 추출 + 보너스 1개<br>
                당첨 확률: 1등(1,000만분의 1), 2등(약 727만분의 1), 3등(약 36만분의 1), 4등(약 1,182분의 1), 5등(약 45분의 1)
            </div>

            <div class="control-panel">
                <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; color: #333;">
                    세트 개수:
                    <input type="number" id="setCount" value="1" min="1" max="10" style="width: 80px;">
                </label>
                <button class="btn-generate" onclick="generateLotto()">🎲 번호 생성</button>
                <button class="btn-clear" onclick="clearAll()">🗑️ 초기화</button>
            </div>

            <div class="numbers-container">
                <div id="numbers" class="numbers-display"></div>
            </div>

            <div id="lottoResults" class="numbers-container"></div>

            <div class="action-buttons" id="actionButtons" style="display: none;">
                <button class="btn-copy" onclick="copyAllNumbers()">📋 전체 복사</button>
                <button class="btn-print" onclick="window.print()">🖨️ 인쇄</button>
            </div>
        </div>
    </div>

    <script>
        let lottoSets = [];

        function getNumberColor(num) {
            if (num <= 10) return 'ball-1';
            if (num <= 20) return 'ball-2';
            if (num <= 30) return 'ball-3';
            if (num <= 40) return 'ball-4';
            return 'ball-5';
        }

        function generateLotto() {
            const setCount = Math.min(parseInt(document.getElementById('setCount').value) || 1, 10);
            lottoSets = [];

            for (let i = 0; i < setCount; i++) {
                const numbers = new Set();
                while (numbers.size < 6) {
                    numbers.add(Math.floor(Math.random() * 45) + 1);
                }

                const allNumbers = Array.from(numbers).sort((a, b) => a - b);
                // 마지막 1개가 보너스 번호
                const regularNumbers = allNumbers.slice(0, 5);
                const bonus = allNumbers[5];

                lottoSets.push({
                    numbers: regularNumbers,
                    bonus: bonus,
                    timestamp: new Date()
                });
            }

            renderResults();

        }

        function renderResults() {
            const resultsDiv = document.getElementById('lottoResults');
            resultsDiv.innerHTML = '';

            if (lottoSets.length === 0) {
                document.getElementById('actionButtons').style.display = 'none';
                return;
            }

            const title = document.createElement('div');
            title.className = 'numbers-title';
            title.textContent = `✨ 생성된 로또 번호 (총 ${lottoSets.length}세트)`;
            resultsDiv.appendChild(title);

            lottoSets.forEach((set, index) => {
                const setDiv = document.createElement('div');
                setDiv.className = 'lotto-set';

                const time = set.timestamp.toLocaleTimeString('ko-KR');
                setDiv.innerHTML = `
                    <div class="set-header">
                        <span class="set-number">${index + 1}번째</span>
                        <span class="set-date">${time}</span>
                    </div>
                    <div class="numbers-display">
                        ${set.numbers.map(num => `<div class="ball ${getNumberColor(num)}">${String(num).padStart(2, '0')}</div>`).join('')}
                        <div class="bonus-separator">+</div>
                        <div class="bonus-label">보너스</div>
                        <div class="ball ball-6">${String(set.bonus).padStart(2, '0')}</div>
                    </div>
                    <div class="copy-btn-set">
                        <button class="btn-copy" onclick="copySet(${index})" style="padding: 6px 12px; font-size: 0.9rem;">📋 복사</button>
                    </div>
                `;
                resultsDiv.appendChild(setDiv);
            });

            document.getElementById('actionButtons').style.display = 'flex';
        }

        function copySet(index) {
            const set = lottoSets[index];
            const text = set.numbers.join(', ') + ' + ' + set.bonus;
            navigator.clipboard.writeText(text).then(() => {
                alert('복사되었습니다!');
            });
        }

        function copyAllNumbers() {
            const text = lottoSets.map((set, i) =>
                `${i + 1}번: ${set.numbers.join(', ')} + ${set.bonus}`
            ).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                alert('모든 번호가 복사되었습니다!');
            });
        }

        function clearAll() {
            if (lottoSets.length === 0 || confirm('모든 번호를 삭제하시겠습니까?')) {
                lottoSets = [];
                document.getElementById('lottoResults').innerHTML = '';
                document.getElementById('actionButtons').style.display = 'none';
            }
        }
    </script>
</body>
</html>
