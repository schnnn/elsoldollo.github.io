<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="개발자를 위한 온라인 유틸리티 모음 - 색상 변환, JSON 포맷터, 이미지 압축, 로또번호 생성 등">
    <meta name="keywords" content="developer tools, 개발자 도구, 색상 변환, json formatter, 이미지 압축, 유틸리티">
    <meta name="author" content="elsoldollo">
    <meta property="og:title" content="Developer Tools - 개발자용 온라인 유틸리티 모음">
    <meta property="og:description" content="개발자를 위한 온라인 도구 모음">
    <meta property="og:url" content="https://elsoldollo.github.io/atall/">
    <meta property="og:type" content="website">
    <title>🛠️ Developer Tools - 개발자용 온라인 유틸리티</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
            animation: fadeIn 0.6s ease-in;
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            font-weight: 700;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.95;
            margin-bottom: 10px;
        }

        header .subtitle {
            font-size: 0.95em;
            opacity: 0.85;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .tool-card {
            background: white;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            animation: slideUp 0.6s ease-in;
        }

        .tool-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .tool-icon {
            font-size: 3em;
            margin-bottom: 15px;
            display: inline-block;
        }

        .tool-card h2 {
            font-size: 1.6em;
            margin-bottom: 12px;
            color: #667eea;
            font-weight: 600;
        }

        .tool-card p {
            font-size: 0.95em;
            color: #666;
            line-height: 1.6;
            flex: 1;
            margin-bottom: 20px;
        }

        .tool-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 600;
            font-size: 0.95em;
        }

        .tool-link:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .coming-soon {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .coming-soon .tool-link {
            background: #ccc;
            cursor: not-allowed;
        }

        footer {
            text-align: center;
            color: white;
            opacity: 0.85;
            font-size: 0.95em;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 60px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2em;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }

            .tool-card {
                padding: 25px;
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛠️ Developer Tools</h1>
            <p>개발자를 위한 온라인 유틸리티 모음</p>
            <p class="subtitle">유용한 도구들을 모아놨습니다. 자유롭게 사용하세요!</p>
        </header>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="toolCount">4</div>
                <div class="stat-label">Available Tools</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">100%</div>
                <div class="stat-label">Free & Open</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">∞</div>
                <div class="stat-label">No Limits</div>
            </div>
        </div>

        <div class="tools-grid" id="toolsGrid"></div>

        <footer>
            <p>© 2026 elsoldollo's Developer Tools | All tools are free and open to use</p>
            <p style="margin-top: 10px; opacity: 0.7;">Made with ❤️ for developers</p>
        </footer>
    </div>

    <script>
        const tools = [
            {
                url: '/color-converter',
                icon: '🎨',
                title: 'Color Converter',
                description: 'HEX, RGB, HSL 색상 변환 및 팔레트 생성'
            },
            {
                url: '/json-formatter',
                icon: '📝',
                title: 'JSON Formatter',
                description: 'JSON 데이터 포맷팅, 검증 및 압축'
            },
            {
                url: '/image-compressor',
                icon: '🖼️',
                title: 'Image Compressor',
                description: '이미지 크기 압축 및 최적화 도구'
            },
            {
                url: '/get-lotto',
                icon: '🎰',
                title: 'Lotto Number Generator',
                description: '로또 번호 생성 및 통계 분석'
            }
        ];

        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = tools.map(tool => `
                <a href="${tool.url}" class="tool-card">
                    <div class="tool-icon">${tool.icon}</div>
                    <h2>${tool.title}</h2>
                    <p>${tool.description}</p>
                    <span class="tool-link">사용하기 →</span>
                </a>
            `).join('');
            document.getElementById('toolCount').textContent = tools.length;
        }

        renderTools();
    </script>
</body>
</html>
