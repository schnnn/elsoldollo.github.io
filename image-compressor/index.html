<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 압축기 - Image Compressor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .content {
            padding: 3rem 2rem;
        }

        .upload-section {
            margin-bottom: 2rem;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 3rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .drop-zone:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            transform: translateY(-2px);
        }

        .drop-zone.dragover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
        }

        .drop-zone svg {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            color: #667eea;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .drop-zone-text h3 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .drop-zone-text p {
            color: #888;
            font-size: 0.95rem;
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .controls.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quality-control {
            margin-bottom: 2.5rem;
        }

        .quality-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .quality-header label {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
        }

        .quality-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #667eea;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: linear-gradient(to right, #667eea, #764ba2);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: 3px solid #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.6);
            transform: scale(1.1);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: 3px solid #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
        }

        .quality-hint {
            color: #999;
            font-size: 0.9rem;
            margin-top: 0.8rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .stat-card.original {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stat-card.compressed {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .stat-card.ratio {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .stat-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 0.8rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .stat-desc {
            font-size: 0.9rem;
            opacity: 0.85;
        }

        .preview-section {
            margin-bottom: 2rem;
        }

        .preview-label {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 1rem;
            display: block;
        }

        .preview-container {
            border-radius: 12px;
            overflow: hidden;
            background: #f9f9f9;
            border: 1px solid #eee;
            max-height: 450px;
        }

        .preview-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .button-group {
            display: flex;
            gap: 1rem;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-download:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .no-image {
            text-align: center;
            color: #999;
            font-size: 0.95rem;
            margin-top: 1rem;
        }

        canvas {
            display: none;
        }

        @media (max-width: 600px) {
            .content {
                padding: 2rem 1.5rem;
            }

            .header {
                padding: 2rem 1.5rem;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Image Compressor</h1>
            <p>브라우저에서 이미지를 압축하세요 - Compress images instantly</p>
        </div>

        <div class="content">
            <div class="upload-section">
                <div class="drop-zone" id="dropZone">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <div class="drop-zone-text">
                        <h3>이미지를 여기에 드롭하세요</h3>
                        <p>또는 클릭하여 파일 선택</p>
                    </div>
                    <input type="file" id="imageInput" accept="image/*">
                </div>
            </div>

            <div class="controls" id="controls">
                <div class="quality-control">
                    <div class="quality-header">
                        <label>압축 품질</label>
                        <span class="quality-value"><span id="qualityValue">80</span>%</span>
                    </div>
                    <input type="range" id="quality" min="10" max="100" value="80" step="5">
                    <p class="quality-hint">낮을수록 작은 파일 크기, 높을수록 더 나은 품질</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card original">
                        <div class="stat-label">원본</div>
                        <div class="stat-value" id="originalSize">-</div>
                        <div class="stat-desc">파일 크기</div>
                    </div>
                    <div class="stat-card compressed">
                        <div class="stat-label">압축됨</div>
                        <div class="stat-value" id="compressedSize">-</div>
                        <div class="stat-desc" id="savings">절감</div>
                    </div>
                    <div class="stat-card ratio">
                        <div class="stat-label">비율</div>
                        <div class="stat-value" id="ratio">-</div>
                        <div class="stat-desc">압축률</div>
                    </div>
                </div>

                <div class="preview-section">
                    <label class="preview-label">미리보기</label>
                    <div class="preview-container">
                        <img id="preview" alt="preview">
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-download" id="downloadBtn">⬇ 다운로드</button>
                    <button class="btn-reset" id="resetBtn">↺ 초기화</button>
                </div>
            </div>

            <div class="no-image" id="noImage">
                모든 처리는 브라우저에서만 이루어집니다 - 완전히 안전합니다 ✓
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const dropZone = document.getElementById('dropZone');
        const imageInput = document.getElementById('imageInput');
        const controls = document.getElementById('controls');
        const noImage = document.getElementById('noImage');
        const quality = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const preview = document.getElementById('preview');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const originalSize = document.getElementById('originalSize');
        const compressedSize = document.getElementById('compressedSize');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const ratio = document.getElementById('ratio');
        const savings = document.getElementById('savings');

        let originalFile = null;
        let originalImage = null;
        let originalBlob = null;

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
        }

        function updatePreview() {
            if (!originalImage) return;

            qualityValue.textContent = quality.value;

            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0);

            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                preview.src = url;
                const compressedSizeBytes = blob.size;
                const originalSizeBytes = originalBlob.size;
                compressedSize.textContent = formatFileSize(compressedSizeBytes);

                const savedBytes = originalSizeBytes - compressedSizeBytes;
                const savedPercent = Math.round((savedBytes / originalSizeBytes) * 100);
                savings.textContent = formatFileSize(savedBytes) + ' 절감 (' + savedPercent + '%)';

                const compressionRatio = (originalSizeBytes / compressedSizeBytes).toFixed(2);
                ratio.textContent = compressionRatio + 'x';
            }, 'image/jpeg', parseInt(quality.value) / 100);
        }

        dropZone.addEventListener('click', () => imageInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        function processFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('이미지 파일을 선택하세요');
                return;
            }

            originalFile = file;
            originalBlob = file;
            originalSize.textContent = formatFileSize(file.size);

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    controls.classList.add('show');
                    noImage.style.display = 'none';
                    updatePreview();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        quality.addEventListener('input', updatePreview);

        downloadBtn.addEventListener('click', () => {
            if (!originalImage) return;

            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'compressed-' + (originalFile.name || 'image.jpg');
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/jpeg', parseInt(quality.value) / 100);
        });

        resetBtn.addEventListener('click', () => {
            imageInput.value = '';
            controls.classList.remove('show');
            noImage.style.display = 'block';
            originalFile = null;
            originalImage = null;
            originalBlob = null;
            quality.value = 80;
            qualityValue.textContent = '80';
        });
    </script>
</body>
</html>
