<html>
<head>
    <title>Color Converter</title>
    <script>
        function rgbToHex() {
            let r = parseInt(document.getElementById('r').value);
            let g = parseInt(document.getElementById('g').value);
            let b = parseInt(document.getElementById('b').value);
            if (isNaN(r) || isNaN(g) || isNaN(b) || r < 0 || r > 255 || g < 0 || g > 255 || b < 0 || b > 255) {
                alert('Please enter valid RGB values');
                return;
            }
            let hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
            document.getElementById('result').innerHTML = `Hex: ${hex}`;
        }
    </script>
</head>
<body>
    <h1>Color Converter</h1>
    <label for='r'>Red (0-255):</label>
    <input type='number' id='r' min='0' max='255'><br>
    <label for='g'>Green (0-255):</label>
    <input type='number' id='g' min='0' max='255'><br>
    <label for='b'>Blue (0-255):</label>
    <input type='number' id='b' min='0' max='255'><br>
    <button onclick='rgbToHex()'>Convert to Hex</button>
    <p id='result'></p>
</body>
</html>
