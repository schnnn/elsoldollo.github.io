<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Converter</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        h1 { color: #333; }
        input { padding: 10px; margin: 10px 0; width: 100%; }
        button { padding: 10px; } 
        .result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Color Converter</h1>
    <input type="text" id="colorInput" placeholder="Enter HEX color code (e.g., #ff5733)"/>
    <button onclick="convertColor()">Convert</button>
    <div class="result" id="result"></div>
    <script>
        function convertColor() {
            const hex = document.getElementById('colorInput').value;
            if (!/^#[0-9A-F]{6}$/i.test(hex)) {
                document.getElementById('result').innerHTML = 'Invalid HEX code.';
                return;
            }
            const rgb = hexToRgb(hex);
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            document.getElementById('result').innerHTML = `RGB: (${rgb.r}, ${rgb.g}, ${rgb.b})<br/>HSL: (${hsl.h}, ${hsl.s}, ${hsl.l})`;
        }

        function hexToRgb(hex) {
            let r = 0, g = 0, b = 0;
            // 3 digits
            if (hex.length === 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            }
            // 6 digits
            else if (hex.length === 7) {
                r = parseInt(hex[1] + hex[2], 16);
                g = parseInt(hex[3] + hex[4], 16);
                b = parseInt(hex[5] + hex[6], 16);
            }
            return { r, g, b };
        }

        function rgbToHsl(r, g, b) {
            r /= 255, g /= 255, b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) {
                h = s = 0; // achromatic
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        function generatePalette(hex) {
            const rgb = hexToRgb(hex);
            const palette = [];
            for(let i = -2; i <= 2; i++) {
                if (i === 0) continue; // Skip the base color
                palette.push(`rgb(${rgb.r + i * 20}, ${rgb.g + i * 20}, ${rgb.b + i * 20})`);
            }
            return palette;
        }
    </script>
</body>
</html>
